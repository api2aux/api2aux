<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">api2aux Architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">One semantic engine, two audiences</text>

  <!-- ═══ INPUT LAYER ═══ -->
  <text x="80" y="95" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">INPUT</text>

  <rect x="30" y="107" width="120" height="44" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="125" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">API Response</text>
  <text x="90" y="141" text-anchor="middle" fill="#64748b" font-size="10">JSON / YAML / XML</text>

  <rect x="30" y="163" width="120" height="44" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="181" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">OpenAPI Spec</text>
  <text x="90" y="197" text-anchor="middle" fill="#64748b" font-size="10">2.0 / 3.x / GraphQL</text>

  <!-- Arrow from input to api-invoke -->
  <path d="M 155 156 L 178 156" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- ═══ API-INVOKE (runtime layer) ═══ -->
  <rect x="183" y="120" width="70" height="72" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="218" y="152" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">api-invoke</text>
  <text x="218" y="165" text-anchor="middle" fill="#64748b" font-size="8">parse</text>
  <text x="218" y="175" text-anchor="middle" fill="#64748b" font-size="8">execute</text>

  <!-- Arrow from api-invoke to engine -->
  <path d="M 258 156 L 278 156" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- ═══ SEMANTIC ENGINE (center) ═══ -->
  <text x="430" y="95" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SEMANTIC ENGINE</text>

  <rect x="283" y="107" width="330" height="180" rx="12" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4" filter="url(#shadow)"/>

  <!-- Engine steps -->
  <rect x="300" y="120" width="140" height="34" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="370" y="142" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Schema Inference</text>

  <rect x="456" y="120" width="140" height="34" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="526" y="142" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Semantic Detection</text>

  <rect x="300" y="166" width="140" height="34" rx="6" fill="#292524" stroke="#ef4444" stroke-width="1"/>
  <text x="370" y="188" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Importance Scoring</text>

  <rect x="456" y="166" width="140" height="34" rx="6" fill="#292524" stroke="#ef4444" stroke-width="1"/>
  <text x="526" y="188" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Workflow Inference</text>

  <rect x="300" y="212" width="140" height="34" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
  <text x="370" y="234" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">Component Selection</text>

  <rect x="456" y="212" width="140" height="34" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
  <text x="526" y="234" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">Plugin Resolution</text>

  <!-- UIPlan output -->
  <rect x="335" y="256" width="225" height="22" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="447" y="272" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">UIPlan descriptor tree</text>

  <!-- ═══ CORS-PROXY (infrastructure) ═══ -->
  <rect x="30" y="225" width="120" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="90" y="244" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">cors-proxy</text>

  <!-- ═══ Arrows from engine to outputs ═══ -->
  <!-- To Human -->
  <path d="M 380 290 L 380 330 Q 380 340 370 340 L 200 340" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <!-- To Agent -->
  <path d="M 510 290 L 510 330 Q 510 340 520 340 L 620 340" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- ═══ HUMAN INTERFACE (bottom left) ═══ -->
  <text x="100" y="335" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">HUMAN INTERFACE</text>

  <rect x="30" y="348" width="165" height="180" rx="10" fill="#0f2922" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="46" y="362" width="133" height="30" rx="5" fill="#064e3b"/>
  <text x="112" y="382" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Smart UI</text>

  <rect x="46" y="400" width="133" height="30" rx="5" fill="#064e3b"/>
  <text x="112" y="420" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">AI Chat</text>

  <rect x="46" y="438" width="133" height="30" rx="5" fill="#064e3b"/>
  <text x="112" y="458" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Share / Embed</text>

  <text x="112" y="488" text-anchor="middle" fill="#4ade80" font-size="10">React + Zustand + Tailwind</text>
  <text x="112" y="502" text-anchor="middle" fill="#64748b" font-size="9">chat-engine powers AI Chat</text>

  <!-- ═══ INTEROP (bottom center) ═══ -->
  <rect x="220" y="370" width="140" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="290" y="386" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Serializers</text>
  <text x="290" y="400" text-anchor="middle" fill="#64748b" font-size="9">A2UI / json-render / AG-UI</text>

  <rect x="385" y="370" width="165" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="467" y="386" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Dynamic MCP Server</text>
  <text x="467" y="400" text-anchor="middle" fill="#64748b" font-size="9">tool-definition-builder + mcp-server</text>

  <!-- ═══ AGENT INTERFACE (bottom right) ═══ -->
  <text x="700" y="335" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">AGENT INTERFACE</text>

  <rect x="625" y="348" width="165" height="180" rx="10" fill="#1e1033" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="641" y="362" width="133" height="30" rx="5" fill="#3b0764"/>
  <text x="707" y="382" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">MCP Tools</text>

  <rect x="641" y="400" width="133" height="30" rx="5" fill="#3b0764"/>
  <text x="707" y="420" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Hosted MCP</text>

  <rect x="641" y="438" width="133" height="30" rx="5" fill="#3b0764"/>
  <text x="707" y="458" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">A2UI / json-render</text>

  <text x="707" y="488" text-anchor="middle" fill="#a78bfa" font-size="10">Claude Desktop + Cursor + SDK</text>
  <text x="707" y="502" text-anchor="middle" fill="#64748b" font-size="9">mcp-server</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="820" y="95" width="125" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="882" y="115" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Packages</text>

  <circle cx="835" cy="133" r="4" fill="#3b82f6"/>
  <text x="845" y="137" fill="#cbd5e1" font-size="9">api-invoke</text>

  <circle cx="835" cy="151" r="4" fill="#f59e0b"/>
  <text x="845" y="155" fill="#cbd5e1" font-size="9">semantic-analysis</text>

  <circle cx="835" cy="169" r="4" fill="#ef4444"/>
  <text x="845" y="173" fill="#cbd5e1" font-size="9">workflow-inference</text>

  <circle cx="835" cy="187" r="4" fill="#f97316"/>
  <text x="845" y="191" fill="#cbd5e1" font-size="9">data2ui</text>

  <circle cx="835" cy="205" r="4" fill="#06b6d4"/>
  <text x="845" y="209" fill="#cbd5e1" font-size="9">chat-engine</text>

  <circle cx="835" cy="223" r="4" fill="#10b981"/>
  <text x="845" y="227" fill="#cbd5e1" font-size="9">app</text>

  <circle cx="835" cy="241" r="4" fill="#8b5cf6"/>
  <text x="845" y="245" fill="#cbd5e1" font-size="9">mcp-server</text>

  <circle cx="835" cy="259" r="4" fill="#64748b"/>
  <text x="845" y="263" fill="#cbd5e1" font-size="9">cors-proxy</text>

  <circle cx="835" cy="277" r="4" fill="#475569"/>
  <text x="845" y="281" fill="#cbd5e1" font-size="9">tool-def-builder</text>
</svg>

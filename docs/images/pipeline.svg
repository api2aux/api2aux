<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="glow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#0f172a" rx="10"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">DATA-FIRST INFERENCE PIPELINE</text>

  <!-- Step 1: Input -->
  <rect x="20" y="50" width="110" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="75" y="73" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Raw Data</text>
  <text x="75" y="90" text-anchor="middle" fill="#64748b" font-size="10">JSON / YAML / XML</text>
  <line x1="130" y1="80" x2="148" y2="80" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Schema -->
  <rect x="152" y="50" width="110" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
  <text x="207" y="73" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Schema</text>
  <text x="207" y="90" text-anchor="middle" fill="#64748b" font-size="10">type inference</text>
  <line x1="262" y1="80" x2="280" y2="80" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Semantics -->
  <rect x="284" y="50" width="110" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" filter="url(#glow)"/>
  <text x="339" y="73" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">Semantics</text>
  <text x="339" y="90" text-anchor="middle" fill="#64748b" font-size="10">21 categories</text>
  <line x1="394" y1="80" x2="412" y2="80" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Selection -->
  <rect x="416" y="50" width="110" height="60" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5" filter="url(#glow)"/>
  <text x="471" y="73" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Selection</text>
  <text x="471" y="90" text-anchor="middle" fill="#64748b" font-size="10">9 heuristics</text>
  <line x1="526" y1="80" x2="544" y2="80" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: UIPlan -->
  <rect x="548" y="50" width="110" height="60" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="603" y="73" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="700">UIPlan</text>
  <text x="603" y="90" text-anchor="middle" fill="#a16207" font-size="10">descriptor tree</text>

  <!-- Fork arrows -->
  <line x1="658" y1="70" x2="690" y2="55" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="658" y1="90" x2="690" y2="105" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Step 6a: Human -->
  <rect x="695" y="38" width="180" height="34" rx="8" fill="#0f2922" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
  <text x="785" y="60" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Smart UI + Chat</text>

  <!-- Step 6b: Agent -->
  <rect x="695" y="88" width="180" height="34" rx="8" fill="#1e1033" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="785" y="110" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">MCP Tools + A2A</text>

  <!-- Bottom labels -->
  <text x="75" y="140" text-anchor="middle" fill="#475569" font-size="9">api-invoke</text>
  <text x="207" y="140" text-anchor="middle" fill="#475569" font-size="9">semantic-analysis</text>
  <text x="339" y="140" text-anchor="middle" fill="#475569" font-size="9">semantic-analysis</text>
  <text x="471" y="140" text-anchor="middle" fill="#475569" font-size="9">data2ui/select</text>
  <text x="603" y="140" text-anchor="middle" fill="#475569" font-size="9">data2ui/plan</text>
  <text x="785" y="140" text-anchor="middle" fill="#475569" font-size="9">app / mcp-server</text>

  <!-- Annotation -->
  <rect x="180" y="160" width="540" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="178" text-anchor="middle" fill="#94a3b8" font-size="11">Data-first: the data decides the UI. No LLM needed. Deterministic, reproducible, serializable.</text>
</svg>
